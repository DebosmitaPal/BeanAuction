version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: beanauction_backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
    container_name: beanauction_frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
  jenkins:
    build:
      context: ./jenkins
    container_name: beanauction_jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    user: root # Needed to access the docker socket on many systems

volumes:
  jenkins_home:
